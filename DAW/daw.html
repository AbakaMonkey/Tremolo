<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAW</title>
</head>
<body>
    <div class="note-durations">
        <button onclick="changeDur('1')">Semibreve</button>
        <button onclick="changeDur('2')">Minim</button>
        <button onclick="changeDur('4')">Crochet</button>
        <button onclick="changeDur('8')">Quaver</button>
        <button onclick="changeDur('16')">Semiquaver</button>
    </div>

    <div class="accidental-selection">
        <button onclick="changeAccidental('b')">b</button>
        <button onclick="changeAccidental('')">Nat.</button>
        <button onclick="changeAccidental('#')">#</button>
    </div>

    <div class="note-names" id="pitches">
        <button onclick="setNoteName('C')">C</button>
        <button onclick="setNoteName('D')">D</button>
        <button onclick="setNoteName('E')">E</button>
        <button onclick="setNoteName('F')">F</button>
        <button onclick="setNoteName('G')">G</button>
        <button onclick="setNoteName('A')">A</button>
        <button onclick="setNoteName('B')">B</button>
    </div>

    <label>
        Position
        <input type="text" placeholder="#" id="position">
    </label>
    <label>
        Octave
        <input type="text" placeholder="#" id="octave">
    </label>

    <button onclick="play()">Play</button>

    <div id="notes">
        
    </div>

    <script src="https://unpkg.com/tone"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
